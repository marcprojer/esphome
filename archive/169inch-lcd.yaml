esphome:
  name: waveshare-lcd
  friendly_name: Waveshare LCD

esp32:
  board: esp32doit-devkit-v1
  framework:
    type: arduino

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Waveshare LCD Fallback"
    password: "12345678"

captive_portal:

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

image:
  - file: "pictures/cat.png"
    id: cat_image
    type: RGB565
    transparency: alpha_channel

color:
  - id: white
    red: 100%
    green: 100%
    blue: 100%
  - id: black
    red: 0%
    green: 0%
    blue: 0%

switch:
  - platform: gpio
    name: "LCD Backlight"
    id: lcd_backlight
    pin: GPIO32
    restore_mode: ALWAYS_ON

display:
  - platform: mipi_spi
    id: lcd
    model: ST7789V
    dimensions:
      width: 240
      height: 280
      offset_width: 0
      offset_height: 20
    cs_pin: GPIO5
    dc_pin: GPIO21
    reset_pin: GPIO22
    color_order: bgr
    invert_colors: true
    spi_mode: MODE0
    data_rate: 20MHz
    update_interval: 1s
    lambda: |-
      it.fill(id(white));
      it.image(
        (it.get_width() - id(cat_image).get_width()) / 2,
        (it.get_height() - id(cat_image).get_height()) / 2,
        id(cat_image)
      );
