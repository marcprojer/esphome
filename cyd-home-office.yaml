                            entity_id: light.spots_ho

              - button:
                  id: btn_3
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_3
                        text: "󱍢"
                        text_font: font_mdi
                        align: center
                  on_click:
                    then:
                      - homeassistant.action:
                          action: light.toggle
                          data:
                            entity_id: light.homeoffice_desklamp

              - button:
                  id: btn_4
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  clickable: true
                  widgets:
                    - label:
                        id: lbl_btn_4
                        text: "󱄄"
                        text_font: font_mdi
                        align: center
                  on_click:
                    then:
