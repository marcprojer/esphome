# Current time sensor for clock button display
  - platform: template
    name: "Current Time"
    id: current_time_display
    internal: true
    update_interval: 1s
    lambda: |-
      auto time = id(sntp_time).now();
      if (!time.is_valid()) {
        return std::string{"--:--"};
      }
      static char buf[16];
      snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
      return std::string{buf};
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_btn_5
            text: !lambda |-
              return x.c_str();

# ============================================================ 
#
#           Touchscreen Display related setup
#
# ============================================================

# SPI bus for TFT display and touch controller
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# Set a pin to control the backlight
output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm

# Tracks if recent touch occurred
globals:
  - id: recent_touch
    type: bool
    restore_value: no
    initial_value: "true"

touchscreen:
  platform: xpt2046
  spi_id: touch
  cs_pin: GPIO33
  interrupt_pin: GPIO36
  update_interval: 50ms
  threshold: 400
  calibration:
    x_min: 180
    x_max: 3800
    y_min: 240
    y_max: 3860
  transform:
    swap_xy: true
  id: my_touch
  on_release:
    then:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "Touch detected - stopping anti-burn pixel training"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - switch.turn_off: switch_antiburn

# Defining the display type and properties, and defining the buttons displayed.
display:
  - platform: ili9xxx
    id: my_display
    color_palette: 8BIT               # Lower memory usage
    model: ili9341                    # Display driver model
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    dimensions:
      width: 320
      height: 240
    invert_colors: false
    transform:
      swap_xy: true
    update_interval: never
    auto_clear_enabled: false
    show_test_card: false

# ============================================================================================================ 
#          
#                     Defining the buttons displayed
#
# ============================================================================================================

lvgl:
  buffer_size: 25%
  displays:
    - my_display
  touchscreens:
    - my_touch
  page_wrap: false
  theme:
    button:
      bg_color: 0x000000
      #bg_opa: COVER
      border_color: 0xFFFFFF
      border_width: 1
      text_color: 0xFFFFFF
      pressed:
        bg_color: 0xC0C0C0
        #bg_grad_color: 0xC0C0C0
        #bg_opa: COVER
      checked:
        bg_color: 0x000000
        #bg_grad_color: 0xFFFFFF
        #bg_opa: COVER
        text_color: 0xFFFF00  # yellow icon when checked
  pages:
    - id: main_page
      pad_all: 0
      widgets:
        - obj:
            width: 320
            height: 240
            bg_color: room_bg_color
            layout:
              type: grid
              grid_columns: [fr(1), fr(1), fr(1)]
              grid_rows: [fr(1), fr(1), fr(1)]
            pad_all: 5px
            outline_pad: 5px
            widgets:
              - button:
                  id: btn_1
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_1
                        text: "󱍢"
                        text_font: font_mdi
                        align: center
                  on_click:
                    then:
                      - homeassistant.action:
                          action: light.toggle
                          data:
                            entity_id: light.office_decke
              - button:
                  id: btn_2
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_2
                        text: "󱍢"
                        text_font: font_mdi
                        align: center
                  on_click:
                    then:
                      - homeassistant.action:
                          action: light.toggle
