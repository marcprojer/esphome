substitutions:
  device_name: cydho
  friendly_name: CYD Home Office

esphome:
  name: $device_name
  friendly_name: $friendly_name

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  logs:
    homeassistant.text_sensor: ERROR

api:
  encryption:
    key: !secret api_key_CYD

ota:
  - platform: esphome
    password: !secret ota_pw_CYD

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Cyd-Home-Office Fallback Hotspot"
    password: !secret fb_pw_CYD

captive_portal:

# Time component
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Zurich
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
    # Schedule pixel training 4 times per night (2,3,4,5 AM) for 30 minutes each
    on_time:
      - hours: 2,5,8
        minutes: 5
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn
      - hours: 2,5,8
        minutes: 35
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn

font:
  - file: "fonts/Arimo-Regular.ttf"  # Path to main font file
    id: arimo36                                         # ID used to reference this font
    size: 36                                            # Font size
    glyphs:                                             # Characters to include in font. Only 
      - " -.,:°%0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "fonts/Arimo-Regular.ttf"  
    id: arimo30                                         
    size: 30                                            
    glyphs:                                             
      - " -.,:°%0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "fonts/Arimo-Regular.ttf"                     
    id: arimo14
    size: 14
    glyphs:
      - " -.,:°%0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "fonts/Arimo-Regular.ttf"  
    id: arimo12                                         
    size: 12                                           
    glyphs:                                             
      - " -.,:°%0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: fonts/materialdesignicons-webfont.ttf         # Defining Material Design Icons as a font. This
    id: font_mdi                                       # will allow us to use them as button icons.
    size: 48                                            # You can get these glyphs from the https://pictogrammers.com/library/mdi/
    glyphs:                                             # where you choose the icon, and then "copy glyph".
      - 󱟴  # lightbulb-spot
      - 󱟵  # lightbulb-spot-off
      - 󰛨  # lightbulb-on
      - 󰌶  # lightbulb-off
      - 󱬠  # desk-lamp
      - 󱬟  # desk-lamp-off
      - 󱙷  # snail
      - 󰐫  # printer-3d
      - 󱬎  # printer-3d-off
      - 󰟽  # 3D logo
      - 󰌑  # return icon
      - 󱁑  # led-strip
      - 󱩋  # led-stripe-off
      - 󰖪  # no-wifi
      - 󱍢  # dino
      - 󰈐  # fan
      - 󰠝  # fan-off
      - 󰒍  # server
      - 󰍹  # monitor
      - 󱄄  # monitor-shimmer
      - 󰒴  # smoking
      - 󰒵  # smoking-off
      - 󰈺  # fish
      - 󱏳  # fish-off

image:
  - file: pictures/logo.png
    id: img_logo
    type: GRAYSCALE
    transparency: opaque
    invert_alpha: true

# Defines the colors we want to use later for the different buttons.
# Per-button customizable colors
color:
  - id: room_bg_color
    hex: "000000"
  - id: default_button_bg_color
    hex: "000000"
  - id: default_button_pressed_bg_color
    hex: "D3D3D3"

# ============================================================ 
#
#         Home Assistant related setup
#
# ============================================================

# Setting the single channel backlight as a light entity in Home Assistant
light:
  - platform: monochromatic
    output: backlight_pwm
    name: Display Backlight
    id: backlight
    restore_mode: ALWAYS_ON

# Anti-burn switch for LVGL pixel exercising
switch:
  - platform: template
    name: "Anti-burn Pixel Training"
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Anti-burn pixel training"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Anti-burn pixel training"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:

