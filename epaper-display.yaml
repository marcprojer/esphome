esphome:
  name: epaper-display
  friendly_name: ePaper Display
  on_boot:
    priority: -100
    then:
      - delay: 60s
      - component.update: eink_display

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key_EINK

  on_client_connected:
    then:
      - logger.log: "Home Assistant API connected, waiting for states..."
      - delay: 60s
      - component.update: eink_display

ota:
  - platform: esphome
    password: !secret ota_pw_EINK

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Epaper-Display Fallback Hotspot"
    password: !secret fb_pw_EINK

captive_portal:

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

time:
  - platform: homeassistant
    id: ha_time

font:
  - file: "gfonts://Atkinson+Hyperlegible"
    id: font_xs
    size: 11

  - file: "gfonts://Atkinson+Hyperlegible"
    id: font_s
    size: 15

  - file: "gfonts://Atkinson+Hyperlegible"
    id: font_m
    size: 19

  - file: "gfonts://Atkinson+Hyperlegible"
    id: font_l
    size: 30

  - file: "gfonts://Atkinson+Hyperlegible"
    id: font_xl
    size: 46

  - file: "gfonts://Atkinson+Hyperlegible"
    id: font_title
    size: 25

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: mdi_large
    size: 58
    glyphs:
      - "\U000F0599" # weather-sunny
      - "\U000F0595" # weather-partly-cloudy
      - "\U000F0590" # weather-cloudy
      - "\U000F0597" # weather-rainy
      - "\U000F0596" # weather-pouring
      - "\U000F0593" # weather-lightning
      - "\U000F067E" # weather-lightning-rainy
      - "\U000F0598" # weather-snowy
      - "\U000F067F" # weather-snowy-rainy
      - "\U000F0591" # weather-fog
      - "\U000F059D" # weather-windy

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: mdi_medium
    size: 34
    glyphs:
      - "\U000F0599" # weather-sunny
      - "\U000F0595" # weather-partly-cloudy
      - "\U000F0590" # weather-cloudy
      - "\U000F0597" # weather-rainy
      - "\U000F0596" # weather-pouring
      - "\U000F0593" # weather-lightning
      - "\U000F067E" # weather-lightning-rainy
      - "\U000F0598" # weather-snowy
      - "\U000F067F" # weather-snowy-rainy
      - "\U000F0591" # weather-fog
      - "\U000F059D" # weather-windy
      - "\U000F029A" # gauge
      - "\U000F058E" # water-percent

