esphome:
  name: epaper-display
  friendly_name: ePaper Display
  on_boot:
    priority: -100
    then:
      - delay: 60s
      - component.update: eink_display

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key_EINK

  on_client_connected:
    then:
      - logger.log: "Home Assistant API connected, waiting for states..."
      - delay: 60s
      - component.update: eink_display

ota:
  - platform: esphome
    password: !secret ota_pw_EINK

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Epaper-Display Fallback Hotspot"
    password: !secret fb_pw_EINK

captive_portal:

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

time:
  - platform: homeassistant
    id: ha_time

font:
