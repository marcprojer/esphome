button:
  - platform: template
    name: "ePaper Display aktualisieren"
    on_press:
      - component.update: eink_display

display:
  - platform: epaper_spi
    id: eink_display
    model: WeAct-4.2in-3c
    cs_pin: GPIO5
    dc_pin: GPIO17
    reset_pin: GPIO16
    reset_duration: 50ms
    busy_pin: GPIO4
    update_interval: 30min
    lambda: |-
      const Color BG = COLOR_ON;
      const Color FG = COLOR_OFF;

      auto valid = [](float v) -> bool {
        return !isnan(v);
      };

      auto condition_de = [](const std::string &c) -> const char* {
        if (c == "sunny") return "Sonnig";
        if (c == "clear-night") return "Klar";
        if (c == "partlycloudy") return "Teilw. bew.";
        if (c == "cloudy") return "Bewölkt";
        if (c == "rainy") return "Regen";
        if (c == "pouring") return "Starkregen";
        if (c == "lightning") return "Gewitter";
        if (c == "lightning-rainy") return "Gewitter";
        if (c == "snowy") return "Schnee";
        if (c == "snowy-rainy") return "Schneeregen";
        if (c == "fog") return "Nebel";
        if (c == "windy") return "Windig";
        if (c == "windy-variant") return "Windig";
        return "Wetter";
      };

      auto day_de = [](const std::string &d) -> const char* {
        if (d == "Mon") return "Mo";
        if (d == "Tue") return "Di";
        if (d == "Wed") return "Mi";
        if (d == "Thu") return "Do";
        if (d == "Fri") return "Fr";
        if (d == "Sat") return "Sa";
        if (d == "Sun") return "So";
        if (d == "Mo" || d == "Di" || d == "Mi" || d == "Do" || d == "Fr" || d == "Sa" || d == "So") return d.c_str();
        return "--";
      };

      auto weather_glyph = [](const std::string &c) -> const char* {
        if (c == "sunny" || c == "clear-night") return "\U000F0599";
        if (c == "partlycloudy") return "\U000F0595";
        if (c == "cloudy") return "\U000F0590";
        if (c == "rainy") return "\U000F0597";
        if (c == "pouring") return "\U000F0596";
        if (c == "lightning") return "\U000F0593";
        if (c == "lightning-rainy") return "\U000F067E";
        if (c == "snowy") return "\U000F0598";
        if (c == "snowy-rainy") return "\U000F067F";
        if (c == "fog") return "\U000F0591";
        if (c == "windy" || c == "windy-variant") return "\U000F059D";
        return "\U000F0590";
      };

      // Screen
      it.fill(BG);

      std::string current_condition = id(weather_condition).has_state()
        ? id(weather_condition).state
        : "";

      // ---------- Header ----------

      // Main icon
      it.printf(15, 8, id(mdi_large), FG, "%s", weather_glyph(current_condition));

      // Condition
      it.printf(95, 10, id(font_l), FG, "%s", condition_de(current_condition));
      it.printf(95, 44, id(font_s), FG, "Knutsch-WG-Trami");

      // Temperature right
      if (valid(id(weather_temperature).state)) {
        it.printf(386, 1, id(font_xl), FG, TextAlign::TOP_RIGHT, "%.1f °C", id(weather_temperature).state);
      } else {
        it.printf(386, 1, id(font_xl), FG, TextAlign::TOP_RIGHT, "--.- °C");
      }

      if (valid(id(fc_high_0).state) && valid(id(fc_low_0).state)) {
        it.printf(
          386, 46, id(font_m), FG, TextAlign::TOP_RIGHT,
          "%.0f °C / %.0f °C",
          id(fc_high_0).state,
          id(fc_low_0).state
        );
      }

      it.line(10, 80, 390, 80, FG);

      // ---------- Forecast ----------
      
      const int xs[5] = {40, 120, 200, 280, 360};

      std::string days[5] = {
        id(fc_day_0).has_state() ? id(fc_day_0).state : "",
        id(fc_day_1).has_state() ? id(fc_day_1).state : "",
        id(fc_day_2).has_state() ? id(fc_day_2).state : "",
        id(fc_day_3).has_state() ? id(fc_day_3).state : "",
        id(fc_day_4).has_state() ? id(fc_day_4).state : ""
      };

      std::string conds[5] = {
        id(fc_cond_0).has_state() ? id(fc_cond_0).state : "",
        id(fc_cond_1).has_state() ? id(fc_cond_1).state : "",
        id(fc_cond_2).has_state() ? id(fc_cond_2).state : "",
        id(fc_cond_3).has_state() ? id(fc_cond_3).state : "",
        id(fc_cond_4).has_state() ? id(fc_cond_4).state : ""
      };

      float highs[5] = {
        id(fc_high_0).state,
        id(fc_high_1).state,
        id(fc_high_2).state,
        id(fc_high_3).state,
        id(fc_high_4).state
      };

      float lows[5] = {
        id(fc_low_0).state,
        id(fc_low_1).state,
        id(fc_low_2).state,
        id(fc_low_3).state,
        id(fc_low_4).state
      };

      for (int i = 0; i < 5; i++) {
        int x = xs[i];

        // Wochentag
        it.printf(x, 85, id(font_s), FG, TextAlign::TOP_CENTER, "%s", day_de(days[i]));

        // Icon als Glyph
        it.printf(x, 101, id(mdi_medium), FG, TextAlign::TOP_CENTER, "%s", weather_glyph(conds[i]));

        // Temperaturen unten: High / Low nebeneinander
        if (valid(highs[i]) && valid(lows[i])) {
          it.printf(x, 129, id(font_s), FG, TextAlign::TOP_CENTER, "%.0f°/%.0f°", highs[i], lows[i]);
        } else if (valid(highs[i])) {
          it.printf(x, 129, id(font_s), FG, TextAlign::TOP_CENTER, "%.0f°", highs[i]);
        } else {
          it.printf(x, 129, id(font_s), FG, TextAlign::TOP_CENTER, "--°");
        }
      }
      
      it.line(10, 150, 390, 150, FG);    

      // ---------- Temperatur innen ----------

      it.printf(12, 155, id(font_xs), FG, "Temperatur innen:");

      const int room_xs[5] = {40, 120, 200, 280, 360};

      const char* room_icons[5] = {
        "\U000F1817", // logia
        "\U000F0FD1", // bedroom
        "\U000F09A0", // bathroom
        "\U000F0F48", // office
        "\U000F081B"  // entrance
      };

      float room_temps[5] = {
        id(temp_logia).state,
        id(temp_bedroom).state,
        id(temp_bathroom).state,
        id(temp_office).state,
        id(temp_entrance).state
      };

      for (int i = 0; i < 5; i++) {
        int x = room_xs[i];

        it.printf(x, 171, id(mdi_medium), FG, TextAlign::TOP_CENTER, "%s", room_icons[i]);

        if (valid(room_temps[i])) {
          it.printf(x, 199, id(font_s), FG, TextAlign::TOP_CENTER, "%.1f°", room_temps[i]);
        } else {
          it.printf(x, 199, id(font_s), FG, TextAlign::TOP_CENTER, "--.-°");
        }
      }
  
      it.line(10, 220, 390, 220, FG); 
      
      // ---------- Limmat ----------

      it.printf(12, 225, id(font_xs), FG, "Infos Limmat:");

      const int limmat_xs[3] = {100, 200, 300};

      const char* limmat_icons[3] = {
        "\U000F1A80", // limmat temp
        "\U000F185A", // limmat flow
        "\U000F185B"  // limmat height
      };

      float limmat_values[3] = {
        id(limmat_temp).state,
        id(limmat_flow).state,
        id(limmat_height).state
      };

      const char* limmat_units[3] = {
        "°C",
        "m³/s",
        "m ü.M."
      };

      for (int i = 0; i < 3; i++) {
        int x = limmat_xs[i];

        it.printf(x, 241, id(mdi_medium), FG, TextAlign::TOP_CENTER, "%s", limmat_icons[i]);

        if (valid(limmat_values[i])) {
          it.printf(x, 269, id(font_s), FG, TextAlign::TOP_CENTER, "%.1f %s", limmat_values[i], limmat_units[i]);
        } else {
          it.printf(x, 269, id(font_s), FG, TextAlign::TOP_CENTER, "--.- %s", limmat_units[i]);
        }
      }
      
      it.line(10, 290, 390, 290, FG); 
      
