    internal: true

  - platform: homeassistant
    id: weather_wind_speed
    entity_id: weather.20_hardturmstrasse_escher_wyss
    attribute: wind_speed
    internal: true

  - platform: homeassistant
    id: weather_wind_bearing
    entity_id: weather.20_hardturmstrasse_escher_wyss
    attribute: wind_bearing
    internal: true

  - platform: homeassistant
    id: fc_high_0
    entity_id: sensor.epaper_forecast_high_0
    internal: true
  - platform: homeassistant
    id: fc_high_1
    entity_id: sensor.epaper_forecast_high_1
    internal: true
  - platform: homeassistant
    id: fc_high_2
    entity_id: sensor.epaper_forecast_high_2
    internal: true
  - platform: homeassistant
    id: fc_high_3
    entity_id: sensor.epaper_forecast_high_3
    internal: true
  - platform: homeassistant
    id: fc_high_4
    entity_id: sensor.epaper_forecast_high_4
    internal: true

  - platform: homeassistant
    id: fc_low_0
    entity_id: sensor.epaper_forecast_low_0
    internal: true
  - platform: homeassistant
    id: fc_low_1
    entity_id: sensor.epaper_forecast_low_1
    internal: true
  - platform: homeassistant
    id: fc_low_2
    entity_id: sensor.epaper_forecast_low_2
    internal: true
  - platform: homeassistant
    id: fc_low_3
    entity_id: sensor.epaper_forecast_low_3
    internal: true
  - platform: homeassistant
    id: fc_low_4
    entity_id: sensor.epaper_forecast_low_4
    internal: true

button:
  - platform: template
    name: "ePaper Display aktualisieren"
    on_press:
      - component.update: eink_display

display:
  - platform: epaper_spi
    id: eink_display
    model: WeAct-4.2in-3c
    cs_pin: GPIO5
    dc_pin: GPIO17
    reset_pin: GPIO16
    reset_duration: 50ms
    busy_pin: GPIO4
    update_interval: 30min
    lambda: |-
      const Color BG = COLOR_ON;
      const Color FG = COLOR_OFF;

      auto valid = [](float v) -> bool {
        return !isnan(v);
      };

      auto condition_de = [](const std::string &c) -> const char* {
        if (c == "sunny") return "Sonnig";
        if (c == "clear-night") return "Klar";
        if (c == "partlycloudy") return "Teilw. bew.";
        if (c == "cloudy") return "Bewölkt";
        if (c == "rainy") return "Regen";
        if (c == "pouring") return "Starkregen";
        if (c == "lightning") return "Gewitter";
        if (c == "lightning-rainy") return "Gewitter";
        if (c == "snowy") return "Schnee";
        if (c == "snowy-rainy") return "Schneeregen";
        if (c == "fog") return "Nebel";
        if (c == "windy") return "Windig";
        if (c == "windy-variant") return "Windig";
        return "Wetter";
      };

      auto day_de = [](const std::string &d) -> const char* {
        if (d == "Mon") return "Mo";
        if (d == "Tue") return "Di";
        if (d == "Wed") return "Mi";
        if (d == "Thu") return "Do";
        if (d == "Fri") return "Fr";
        if (d == "Sat") return "Sa";
        if (d == "Sun") return "So";
        if (d == "Mo" || d == "Di" || d == "Mi" || d == "Do" || d == "Fr" || d == "Sa" || d == "So") return d.c_str();
        return "--";
      };

      auto bearing_to_text = [](float deg) -> const char* {
        if (isnan(deg)) return "-";
        if (deg >= 337.5 || deg < 22.5) return "N";
        if (deg < 67.5) return "NO";
        if (deg < 112.5) return "O";
        if (deg < 157.5) return "SO";
        if (deg < 202.5) return "S";
        if (deg < 247.5) return "SW";
        if (deg < 292.5) return "W";
        return "NW";
      };

      auto weather_glyph = [](const std::string &c) -> const char* {
        if (c == "sunny" || c == "clear-night") return "\U000F0599";
        if (c == "partlycloudy") return "\U000F0595";
        if (c == "cloudy") return "\U000F0590";
        if (c == "rainy") return "\U000F0597";
        if (c == "pouring") return "\U000F0596";
        if (c == "lightning") return "\U000F0593";
        if (c == "lightning-rainy") return "\U000F067E";
        if (c == "snowy") return "\U000F0598";
        if (c == "snowy-rainy") return "\U000F067F";
        if (c == "fog") return "\U000F0591";
        if (c == "windy" || c == "windy-variant") return "\U000F059D";
        return "\U000F0590";
      };

      // Screen
      it.fill(BG);

      std::string current_condition = id(weather_condition).has_state()
        ? id(weather_condition).state
        : "";

      // ---------- Header ----------

      // Main icon
      it.printf(15, 6, id(mdi_large), FG, "%s", weather_glyph(current_condition));

      // Condition
      it.printf(95, 8, id(font_l), FG, "%s", condition_de(current_condition));
      it.printf(95, 42, id(font_s), FG, "Knutsch-WG-Trami");

      // Temperature right
      if (valid(id(weather_temperature).state)) {
        it.printf(386, 42, id(font_xl), FG, TextAlign::TOP_RIGHT, "%.1f °C", id(weather_temperature).state);
      } else {
        it.printf(386, 42, id(font_xl), FG, TextAlign::TOP_RIGHT, "--.- °C");
      }

      if (valid(id(fc_high_0).state) && valid(id(fc_low_0).state)) {
        it.printf(
          386, 88, id(font_m), FG, TextAlign::TOP_RIGHT,
          "%.0f °C / %.0f °C",
          id(fc_high_0).state,
          id(fc_low_0).state
        );
      }

      it.line(10, 116, 390, 116, FG);

      // ---------- Detail rows ----------
      // Row height 32 px
      it.printf(18, 123, id(mdi_medium), FG, "\U000F029A");
      it.printf(58, 126, id(font_s), FG, "Luftdruck");
      if (valid(id(weather_pressure).state)) {
        it.printf(382, 126, id(font_s), FG, TextAlign::TOP_RIGHT, "%.1f hPa", id(weather_pressure).state);
      } else {
        it.printf(382, 126, id(font_s), FG, TextAlign::TOP_RIGHT, "- hPa");
      }
      it.line(10, 151, 390, 151, FG);

      it.printf(18, 156, id(mdi_medium), FG, "\U000F058E");
      it.printf(58, 159, id(font_s), FG, "Luftfeuchtigkeit");
      if (valid(id(weather_humidity).state)) {
        it.printf(382, 159, id(font_s), FG, TextAlign::TOP_RIGHT, "%.0f %%", id(weather_humidity).state);
      } else {
        it.printf(382, 159, id(font_s), FG, TextAlign::TOP_RIGHT, "- %%");
      }
      it.line(10, 184, 390, 184, FG);

      it.printf(18, 189, id(mdi_medium), FG, "\U000F059D");
      it.printf(58, 192, id(font_s), FG, "Wind");
      if (valid(id(weather_wind_speed).state)) {
        it.printf(
          382, 192, id(font_s), FG, TextAlign::TOP_RIGHT,
          "%.1f km/h (%s)",
          id(weather_wind_speed).state,
          bearing_to_text(id(weather_wind_bearing).state)
        );
      } else {
        it.printf(382, 192, id(font_s), FG, TextAlign::TOP_RIGHT, "- km/h");
      }
      it.line(10, 217, 390, 217, FG);

      // ---------- Forecast ----------
      it.printf(12, 220, id(font_m), FG, "Vorhersage:");

      const int xs[5] = {40, 120, 200, 280, 360};

      std::string days[5] = {
        id(fc_day_0).has_state() ? id(fc_day_0).state : "",
        id(fc_day_1).has_state() ? id(fc_day_1).state : "",
        id(fc_day_2).has_state() ? id(fc_day_2).state : "",
        id(fc_day_3).has_state() ? id(fc_day_3).state : "",
        id(fc_day_4).has_state() ? id(fc_day_4).state : ""
      };

      std::string conds[5] = {
        id(fc_cond_0).has_state() ? id(fc_cond_0).state : "",
        id(fc_cond_1).has_state() ? id(fc_cond_1).state : "",
        id(fc_cond_2).has_state() ? id(fc_cond_2).state : "",
        id(fc_cond_3).has_state() ? id(fc_cond_3).state : "",
        id(fc_cond_4).has_state() ? id(fc_cond_4).state : ""
      };

      float highs[5] = {
        id(fc_high_0).state,
        id(fc_high_1).state,
        id(fc_high_2).state,
        id(fc_high_3).state,
        id(fc_high_4).state
      };

      float lows[5] = {
        id(fc_low_0).state,
        id(fc_low_1).state,
        id(fc_low_2).state,
        id(fc_low_3).state,
        id(fc_low_4).state
      };

      for (int i = 0; i < 5; i++) {
        int x = xs[i];

        // Wochentag
        it.printf(x, 242, id(font_s), FG, TextAlign::TOP_CENTER, "%s", day_de(days[i]));

        // Icon als Glyph
        it.printf(x, 258, id(mdi_medium), FG, TextAlign::TOP_CENTER, "%s", weather_glyph(conds[i]));

        // Temperaturen unten: High / Low nebeneinander
        if (valid(highs[i]) && valid(lows[i])) {
          it.printf(x, 286, id(font_s), FG, TextAlign::TOP_CENTER, "%.0f°/%.0f°", highs[i], lows[i]);
        } else if (valid(highs[i])) {
          it.printf(x, 286, id(font_s), FG, TextAlign::TOP_CENTER, "%.0f°", highs[i]);
        } else {
          it.printf(x, 286, id(font_s), FG, TextAlign::TOP_CENTER, "--°");
        }
      }