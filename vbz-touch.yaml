substitutions:
  device_name: vbz-display
  friendly_name: CYD VBZ Display

esphome:
  name: $device_name
  friendly_name: $friendly_name

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  logs:
    text_sensor: WARN

api:
  encryption:
    key: !secret api_key_CYD2

ota:
  - platform: esphome
    password: !secret ota_pw_CYD2

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Cyd-Home-Office Fallback Hotspot"
    password: !secret fb_pw_CYD2

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Zurich
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
    on_time:
      - hours: 2,5,8
        minutes: 5
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn
      - hours: 2,5,8
        minutes: 35
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn

font:
  - file: fonts/Arimo-Regular.ttf
    id: arimo30
    size: 30
    glyphs:
      - " -.,:°%0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: fonts/Arimo-Regular.ttf
    id: arimo22
    size: 22
    glyphs:
      - " -.,:°%0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: fonts/materialdesignicons-webfont.ttf
    id: font_mdi # https://pictogrammers.com/library/mdi/
    size: 48
    glyphs:
      - 󰳢  # arrow-up-circle-outline
      - 󰳜  # arrow-down-circle-outline
      - 󰃧  # bus
      - 󰔭  # tram
      - 󱳇  # train-bus (all)
      - 󰤂  # power-off
      - 󰤆  # power-on
      - 󰞕  # arrow-collapse-up

color:
  - id: room_bg_color
    hex: "000000"
  - id: default_button_bg_color
    hex: "000000"
  - id: default_button_pressed_bg_color
    hex: "D3D3D3"

light:
  - platform: monochromatic
    output: backlight_pwm
    name: Display Backlight
    id: backlight
    restore_mode: ALWAYS_ON

switch:
  - platform: template
    name: "Anti-burn Pixel Training"
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Anti-burn pixel training"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Anti-burn pixel training"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:

text_sensor:
  - platform: template
    name: "Current Time"
    id: current_time_display
    internal: true
    update_interval: 1s
    lambda: |-
      auto time = id(sntp_time).now();
      if (!time.is_valid()) {
        return std::string{"--:--"};
      }
      static char buf[16];
      snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
      return std::string{buf};
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_time
            text: !lambda |-
              return x.c_str();

  - platform: homeassistant
    id: vbz_display_mode_text
    entity_id: sensor.vbz_display_mode
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_mode
            text: !lambda |-
              if (x.empty()) {
                return std::string{"-"};
              }
              if (x.rfind("platform_", 0) == 0 && x.size() > 9) {
                return x.substr(9);
              }
              return x;
        - lvgl.widget.update:
            id: btn_all
            state:
              checked: !lambda |-
                return (x == "all" || x == "ALL" || x == "All");
        - lvgl.widget.update:
            id: btn_tram
            state:
              checked: !lambda |-
                return (x == "tram" || x == "TRAM" || x == "Tram");
        - lvgl.widget.update:
            id: btn_bus
            state:
              checked: !lambda |-
                return (x == "bus" || x == "BUS" || x == "Bus");
        - lvgl.widget.update:
            id: btn_platform_a
            state:
              checked: !lambda |-
                return (x == "platform_A" || x == "platform_a");
        - lvgl.widget.update:
            id: btn_platform_b
            state:
              checked: !lambda |-
                return (x == "platform_B" || x == "platform_b");
        - lvgl.widget.update:
            id: btn_platform_c
            state:
              checked: !lambda |-
                return (x == "platform_C" || x == "platform_c");
        - lvgl.widget.update:
            id: btn_platform_d
            state:
              checked: !lambda |-
                return (x == "platform_D" || x == "platform_d");
        - lvgl.widget.update:
            id: btn_platform_e
            state:
              checked: !lambda |-
                return (x == "platform_E" || x == "platform_e");
        - lvgl.widget.update:
            id: btn_platform_f
            state:
              checked: !lambda |-
                return (x == "platform_F" || x == "platform_f");

  - platform: homeassistant
    id: vbz_display_awake_text
    entity_id: sensor.vbz_display_awake
    on_value:
      then:
        - lvgl.widget.update:
            id: btn_on
            state:
              checked: !lambda |-
                return (x == "true" || x == "True" || x == "on" || x == "ON" || x == "1");

spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm

globals:
  - id: recent_touch
    type: bool
    restore_value: no
    initial_value: "true"

touchscreen:
  platform: xpt2046
  spi_id: touch
  cs_pin: GPIO33
  interrupt_pin: GPIO36
  update_interval: 50ms
  threshold: 400
  calibration:
    x_min: 180
    x_max: 3800
    y_min: 240
    y_max: 3860
  transform:
    swap_xy: true
  id: my_touch
  on_release:
    then:
      - light.turn_on: backlight
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "Touch detected - stopping anti-burn pixel training"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - switch.turn_off: switch_antiburn

display:
  - platform: ili9xxx
    id: my_display
    color_palette: 8BIT
    model: ili9341
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    dimensions:
      width: 320
      height: 240
    invert_colors: false
    transform:
      swap_xy: true
    update_interval: never
    auto_clear_enabled: false
    show_test_card: false

lvgl:
  buffer_size: 25%
  displays:
    - my_display
  touchscreens:
    - my_touch
  page_wrap: false
  theme:
    button:
      bg_color: 0x000000
      bg_opa: COVER
      border_color: 0xFFFFFF
      border_width: 2
      text_color: 0xFFFFFF
      pressed:
        bg_color: 0x505050
        bg_grad_color: 0x505050
        bg_opa: COVER
      checked:
        bg_color: 0xFFFFFF
        bg_grad_color: 0xFFFFFF
        bg_opa: COVER
        text_color: 0xFFFF00
  pages:
    - id: main_page
      pad_all: 0
      widgets:
        - obj:
            width: 320
            height: 240
            bg_color: room_bg_color
            layout:
              type: grid
              grid_columns: [fr(1), fr(1), fr(1)]
              grid_rows: [fr(1), fr(1), fr(1)]
            pad_all: 5px
            outline_pad: 5px
            
            widgets:
            #buttons
              - button:
                  id: btn_on
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "󰤆"
                        text_font: font_mdi
                        align: center
                  on_click:
                    then:
                      - if:
                          condition:
                            lambda: |-
                              auto awake_state = id(vbz_display_awake_text).state;
                              return (awake_state == "true" || awake_state == "True" || awake_state == "on" || awake_state == "ON" || awake_state == "1");
                          then:
                            - homeassistant.service:
                                service: script.vbz_display_off
                          else:
                            - homeassistant.service:
                                service: script.vbz_display_on
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_awake

              - button:
                  id: panel_time
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        id: lbl_time
                        text: "--:--"
                        text_font: arimo30
                        align: center

              - button:
                  id: btn_all
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "󱳇"
                        text_font: font_mdi
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_all
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode

              - button:
                  id: btn_tram
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "󰔭"
                        text_font: font_mdi
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_tram
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode

              - button:
                  id: btn_bus
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "󰃧"
                        text_font: font_mdi
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_bus
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode

              - button:
                  id: btn_down
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "󰳜"
                        text_font: font_mdi
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_scroll_down
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode

              - button:
                  id: btn_up
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "󰳢"
                        text_font: font_mdi
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_scroll_up
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode

              - button:
                  id: panel_mode
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        id: lbl_mode
                        text: "-"
                        text_font: arimo22
                        align: center

              - button:
                  id: btn_platforms
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "A-F"
                        text_font: arimo22
                        align: center
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: sub_page
                          animation: MOVE_LEFT
                          time: 250ms


    - id: sub_page
      pad_all: 0
      widgets:
        - obj:
            width: 320
            height: 240
            bg_color: room_bg_color
            layout:
              type: grid
              grid_columns: [fr(1), fr(1), fr(1)]
              grid_rows: [fr(1), fr(1), fr(1)]
            pad_all: 5px
            outline_pad: 5px
            widgets:
              - button:
                  id: btn_platform_a
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "A"
                        text_font: arimo30
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_platform_a
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode

              - button:
                  id: btn_platform_b
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "B"
                        text_font: arimo30
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_platform_b
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode

              - button:
                  id: btn_platform_c
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "C"
                        text_font: arimo30
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_platform_c
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode

              - button:
                  id: btn_platform_d
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "D"
                        text_font: arimo30
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_platform_d
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode

              - button:
                  id: btn_platform_e
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "E"
                        text_font: arimo30
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_platform_e
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode

              - button:
                  id: btn_platform_f
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "F"
                        text_font: arimo30
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_platform_f
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode

              - button:
                  id: btn_back_main
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  bg_color: default_button_bg_color
                  pressed:
                    bg_color: default_button_pressed_bg_color
                  widgets:
                    - label:
                        text: "ALL"
                        text_font: arimo22
                        align: center
                  on_click:
                    then:
                      - homeassistant.service:
                          service: script.vbz_display_all
                      - homeassistant.service:
                          service: homeassistant.update_entity
                          data:
                            entity_id: sensor.vbz_display_mode
                      - lvgl.page.show:
                          id: main_page
                          animation: MOVE_RIGHT
                          time: 250ms